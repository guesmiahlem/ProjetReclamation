name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 1. Build & Push Backend
    - name: Build and push Backend image
      uses: docker/build-push-action@v4
      with:
        context: ./reclamation
        push: true
        tags: |
          ${{ secrets.DOCKER_USER }}/reclamation-backend:latest
          ${{ secrets.DOCKER_USER }}/reclamation-backend:${{ github.sha }}

    # 2. Build & Push Frontend
    - name: Build and push Frontend image
      uses: docker/build-push-action@v4
      with:
        context: ./reclamationfrontend
        push: true
        tags: |
          ${{ secrets.DOCKER_USER }}/reclamation-frontend:latest
          ${{ secrets.DOCKER_USER }}/reclamation-frontend:${{ github.sha }}
